<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Reset Password - MathEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="register-page">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="Img/logo/logo-white.png" alt="MathEase Logo" class="logo-img">
                <span>MathEase</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="teacher-login.html" class="nav-link">Teacher Login</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <section class="auth-section" style="padding-top:60px;">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Teacher — Set new password</h2>
                    <p>Choose a new password for your teacher account.</p>
                </div>

                <form class="auth-form" id="teacher-reset-password-form">
                    <input type="hidden" id="reset-token" name="token">

                    <div class="form-group">
                        <label for="new-password">New password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="new-password" name="new_password" required placeholder="At least 8 characters" minlength="8" autocomplete="new-password">
                            <span class="toggle-password" onclick="togglePassword('new-password')">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm-password" name="confirm_password" required placeholder="Confirm new password" minlength="8" autocomplete="new-password">
                            <span class="toggle-password" onclick="togglePassword('confirm-password')">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-key"></i>
                            Update password
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p><a href="teacher-login.html">Back to teacher login</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Swal.fire({
                icon: 'error',
                title: 'Invalid link',
                text: 'This reset link is missing or invalid.',
                confirmButtonText: 'Teacher login'
            }).then(function () {
                window.location.href = 'teacher-login.html';
            });
        } else {
            document.getElementById('reset-token').value = token;
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const wrap = field.nextElementSibling;
            const icon = wrap && wrap.querySelector('i');
            if (!icon) return;
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('teacher-reset-password-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const newPassword = formData.get('new_password');
            const confirmPassword = formData.get('confirm_password');
            const resetToken = formData.get('token');

            if (newPassword !== confirmPassword) {
                Swal.fire({ icon: 'error', title: 'Mismatch', text: 'Passwords do not match.', confirmButtonText: 'OK' });
                return;
            }
            if (newPassword.length < 8) {
                Swal.fire({ icon: 'error', title: 'Too short', text: 'Use at least 8 characters.', confirmButtonText: 'OK' });
                return;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            const originalHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('php/teacher-reset-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, new_password: newPassword }),
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Password updated',
                        text: data.message || 'You can sign in with your new password.',
                        confirmButtonText: 'Teacher login'
                    });
                    window.location.href = 'teacher-login.html';
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Reset failed',
                        text: data.message || 'Please request a new link.',
                        confirmButtonText: 'OK'
                    });
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Something went wrong. Please try again.',
                    confirmButtonText: 'OK'
                });
            } finally {
                submitBtn.innerHTML = originalHtml;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
