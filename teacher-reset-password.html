<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Reset Password - MathEase</title>
    <link rel="icon" type="image/png" href="Img/logo/logo-gradient.png">
    <link rel="apple-touch-icon" href="Img/logo/logo-gradient.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="register-page">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="Img/logo/logo-white.png" alt="MathEase Logo" class="logo-img">
                <span>MathEase</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="teacher-login.html" class="nav-link">Teacher Login</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <section class="auth-section" style="padding-top:60px;">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Teacher — Set new password</h2>
                    <p>Choose a new password for your teacher account (same rules as registration).</p>
                </div>

                <form class="auth-form" id="teacher-reset-password-form">
                    <input type="hidden" id="reset-token" name="token">

                    <div class="form-group">
                        <label for="new-password">New password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="new-password" name="new_password" required placeholder="8–30 characters, mixed case, number, symbol" minlength="8" maxlength="30" autocomplete="new-password">
                            <button type="button" class="toggle-password" aria-label="Show or hide password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="teacherResetPasswordStrength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="teacherResetStrengthFill"></div>
                            </div>
                            <div class="strength-info">
                                <span class="strength-text" id="teacherResetStrengthText">Password strength</span>
                            </div>
                            <div class="password-requirements" id="teacherResetPasswordRequirements">
                                <div class="requirement" data-requirement="length">
                                    <i class="fas fa-circle"></i>
                                    <span>8 to 30 characters</span>
                                </div>
                                <div class="requirement" data-requirement="lowercase">
                                    <i class="fas fa-circle"></i>
                                    <span>One lowercase letter</span>
                                </div>
                                <div class="requirement" data-requirement="uppercase">
                                    <i class="fas fa-circle"></i>
                                    <span>One uppercase letter</span>
                                </div>
                                <div class="requirement" data-requirement="number">
                                    <i class="fas fa-circle"></i>
                                    <span>One number</span>
                                </div>
                                <div class="requirement" data-requirement="special">
                                    <i class="fas fa-circle"></i>
                                    <span>One special character</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm-password" name="confirm_password" required placeholder="Confirm new password" minlength="8" maxlength="30" autocomplete="new-password">
                            <button type="button" class="toggle-password" aria-label="Show or hide password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-key"></i>
                            Update password
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p><a href="teacher-login.html">Back to teacher login</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Swal.fire({
                icon: 'error',
                title: 'Invalid link',
                text: 'This reset link is missing or invalid.',
                confirmButtonText: 'Teacher login'
            }).then(function () {
                window.location.href = 'teacher-login.html';
            });
        } else {
            document.getElementById('reset-token').value = token;
        }

        function teacherResetPasswordAllRequirementsMet(password) {
            if (typeof getPasswordRequirements !== 'function') return false;
            const req = getPasswordRequirements(password);
            return Object.values(req).every(Boolean);
        }

        (function initTeacherResetStrength() {
            var np = document.getElementById('new-password');
            var ind = document.getElementById('teacherResetPasswordStrength');
            if (!np || !ind || typeof updatePasswordStrength !== 'function' || typeof calculatePasswordStrength !== 'function') return;
            np.addEventListener('input', function () {
                updatePasswordStrength(ind, calculatePasswordStrength(this.value));
            });
            updatePasswordStrength(ind, calculatePasswordStrength(''));
        })();

        document.getElementById('teacher-reset-password-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const newPassword = formData.get('new_password');
            const confirmPassword = formData.get('confirm_password');
            const resetToken = formData.get('token');

            if (newPassword !== confirmPassword) {
                Swal.fire({ icon: 'error', title: 'Mismatch', text: 'Passwords do not match.', confirmButtonText: 'OK' });
                return;
            }
            if (!teacherResetPasswordAllRequirementsMet(newPassword)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Password requirements',
                    html: 'Your password must have:<ul class="text-left mt-2" style="display:inline-block"><li>8 to 30 characters</li><li>One lowercase letter</li><li>One uppercase letter</li><li>One number</li><li>One special character</li></ul>',
                    confirmButtonText: 'OK'
                });
                return;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            const originalHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('php/teacher-reset-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, new_password: newPassword }),
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Password updated',
                        text: data.message || 'You can sign in with your new password.',
                        confirmButtonText: 'Teacher login'
                    });
                    window.location.href = 'teacher-login.html';
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Reset failed',
                        text: data.message || 'Please request a new link.',
                        confirmButtonText: 'OK'
                    });
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Something went wrong. Please try again.',
                    confirmButtonText: 'OK'
                });
            } finally {
                submitBtn.innerHTML = originalHtml;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
