<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Forgot Password - MathEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="register-page">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="Img/logo/logo-white.png" alt="MathEase Logo" class="logo-img">
                <span>MathEase</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="index.html#topics" class="nav-link">Topics</a></li>
                <li class="nav-item"><a href="index.html#teachers" class="nav-link">For Teachers</a></li>
                <li class="nav-item"><a href="teacher-login.html" class="nav-link">Teacher Login</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <section class="auth-section" style="padding-top:60px;">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Teacher — Forgot password?</h2>
                    <p>Enter the email you used to register. We will send a link to reset your password.</p>
                </div>

                <form class="auth-form" id="teacher-forgot-password-form">
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" required placeholder="Your registered teacher email" autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-paper-plane"></i>
                            Send reset link
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="teacher-login.html">Back to teacher login</a></p>
                    <p class="mt-2"><a href="login.html" class="text-sm text-gray-600">Student login</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('teacher-forgot-password-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const email = formData.get('email');

            const submitBtn = this.querySelector('button[type="submit"]');
            const originalHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('php/teacher-forgot-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email }),
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Check your email',
                        html: '<p>' + (data.message || 'If an account exists, we sent a reset link.') + '</p><p>Check your inbox and spam folder.</p>',
                        confirmButtonText: 'OK'
                    });
                    window.location.href = 'teacher-login.html';
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Unable to send',
                        text: data.message || 'Please try again.',
                        confirmButtonText: 'OK'
                    });
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Could not send the reset link. Please try again.',
                    confirmButtonText: 'OK'
                });
            } finally {
                submitBtn.innerHTML = originalHtml;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
