<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MathEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="css/nav-logo/nav-logo.png" alt="MathEase Logo" class="logo-img">
                <span>MathEase</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="login.html" class="nav-link">Student Login</a></li>
                <li class="nav-item"><a href="teacher-login.html" class="nav-link">Teacher Login</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <img src="css/nav-logo/logo-mid.png" alt="MathEase Logo" class="auth-logo-img">
                        <h1>MathEase</h1>
                    </div>
                    <h2>Admin Login</h2>
                    <p>Sign in to access the admin dashboard</p>
                </div>

                <form class="auth-form" id="admin-login-form" action="php/admin-login.php" method="POST">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" required placeholder="Admin email" autocomplete="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" required placeholder="Admin password" autocomplete="current-password">
                            <button type="button" class="toggle-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>
                </form>

                <div class="auth-footer">
                    <p><a href="index.html">Back to Home</a></p>
                    <p class="mt-2"><a href="login.html">Student Login</a> · <a href="teacher-login.html">Teacher Login</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/admin-auth.js"></script>
</body>
</html>
