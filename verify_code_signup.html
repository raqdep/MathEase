<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account - MathEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* OTP verification page — layout matches account verification design */
        .verify-otp-page {
            min-height: 100vh;
            background: #e8eaed !important;
            margin: 0;
        }

        .verify-otp-page .auth-section {
            min-height: 100vh;
            background: transparent !important;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }

        .verify-otp-page .auth-container {
            max-width: 440px;
            width: 100%;
        }

        .verify-otp-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        .verify-otp-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        .verify-otp-brand img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .verify-otp-brand span {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.02em;
        }

        .verify-otp-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
        }

        .verify-otp-subtitle {
            font-size: 0.95rem;
            font-weight: 400;
            color: #6b7280;
            margin: 0 0 1.75rem;
        }

        .verify-email-block {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .verify-email-block label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.35rem;
        }

        .verify-email-block input {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #f9fafb;
        }

        .verify-email-block input:focus {
            outline: none;
            border-color: #7dd3fc;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        .otp-input-row {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
            flex-wrap: nowrap;
        }

        .otp-digit {
            width: 2.75rem;
            height: 3rem;
            border: none;
            border-radius: 10px;
            background: #f3f4f6;
            font-size: 1.35rem;
            font-weight: 600;
            color: #111827;
            text-align: center;
            transition: background 0.15s ease, box-shadow 0.15s ease;
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .otp-digit::-webkit-outer-spin-button,
        .otp-digit::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .otp-digit:focus {
            outline: none;
            background: #ffffff;
            box-shadow: 0 0 0 2px #7dd3fc;
        }

        .otp-digit::placeholder {
            color: transparent;
        }

        .verify-otp-btn {
            width: 100%;
            padding: 0.85rem 1.25rem;
            border: none;
            border-radius: 12px;
            background: #0ea5e9;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.35);
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
        }

        .verify-otp-btn:hover {
            background: #0284c7;
            box-shadow: 0 10px 24px rgba(14, 165, 233, 0.4);
        }

        .verify-otp-btn:active {
            transform: translateY(1px);
        }

        .verify-otp-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .verify-resend-wrap {
            margin-top: 1.25rem;
        }

        .verify-resend-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.9rem;
            color: #4b5563;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
            font-family: inherit;
        }

        .verify-resend-btn:hover {
            color: #111827;
        }

        .verify-resend-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #verificationMessage {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.25em;
        }

        .verify-back-signin {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #6b7280;
        }

        .verify-back-signin a {
            color: #0ea5e9;
            font-weight: 600;
            text-decoration: none;
        }

        .verify-back-signin a:hover {
            text-decoration: underline;
        }

        @media (min-width: 400px) {
            .otp-digit {
                width: 3rem;
                height: 3.25rem;
                font-size: 1.4rem;
            }
            .otp-input-row {
                gap: 0.65rem;
            }
        }
    </style>
</head>
<body class="register-page verify-otp-page">
    <section class="auth-section">
        <div class="auth-container">
            <div class="verify-otp-card" id="verifyContainer">
                <div class="verify-otp-brand">
                    <img src="Img/logo/logo-gradient.png" alt="">
                    <span>MathEase</span>
                </div>

                <h1 class="verify-otp-title">Account Verification</h1>
                <p class="verify-otp-subtitle">Enter Verify Code Below</p>

                <div class="verify-email-block" id="emailBlock" style="display: none;">
                    <label for="verifyEmail" id="emailLabel">Email</label>
                    <input id="verifyEmail" type="email" placeholder="you@example.com" autocomplete="email">
                </div>

                <div class="otp-input-row" id="otpInputs" role="group" aria-label="One-time verification code">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" data-otp-index="0" aria-label="Digit 1 of 6">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" data-otp-index="1" aria-label="Digit 2 of 6">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" data-otp-index="2" aria-label="Digit 3 of 6">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" data-otp-index="3" aria-label="Digit 4 of 6">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" data-otp-index="4" aria-label="Digit 5 of 6">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" data-otp-index="5" aria-label="Digit 6 of 6">
                </div>

                <!-- Kept for scripts that expect #otpCode; synced from boxes -->
                <input type="hidden" id="otpCode" value="">

                <button type="button" class="verify-otp-btn" id="checkEmailBtn">Verify Code</button>

                <div class="verify-resend-wrap">
                    <button type="button" class="verify-resend-btn" id="resendEmailBtn">Resend Code</button>
                </div>

                <div id="verificationMessage"></div>

                <p class="verify-back-signin">Return to <a href="login.html" id="teacherSignInFallback">Sign in</a></p>
            </div>
        </div>
    </section>

    <script src="js/verify-signup.js"></script>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var isTeacher = params.get('type') === 'teacher';
            var signIn = document.getElementById('teacherSignInFallback');
            if (signIn && isTeacher) signIn.href = 'teacher-login.html';
        })();
    </script>
</body>
</html>
