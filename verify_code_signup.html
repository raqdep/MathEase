<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code - MathEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="register-page">
    <section class="auth-section" style="padding-top:60px;">
        <div class="auth-container">
            <div class="auth-card" id="verifyContainer">
                <div class="auth-header">
                    <h2>Verify your Account</h2>
                    <p>Enter the 6-digit code sent to your email to verify your account.</p>
                </div>

                <div class="auth-form">
                    <div class="form-group">
                        <label for="otpCodePage">Verification Code</label>
                        <div class="input-group">
                            <i class="fas fa-key"></i>
                            <input type="text" id="otpCodePage" maxlength="6" placeholder="123456" inputmode="numeric" autocomplete="one-time-code">
                        </div>
                    </div>
                    <div id="otpMessagePage" style="color:#666;margin-bottom:0.5rem;font-size:0.95rem;"></div>

                    <div class="form-group">
                        <button class="btn btn-outline" id="resendOtpPageBtn">Resend</button>
                        <button class="btn btn-primary" id="verifyOtpPageBtn">Verify</button>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>Return to <a href="login.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/verify-signup.js"></script>
</body>
</html>
